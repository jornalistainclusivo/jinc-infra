services:
  cms:
    build:
      context: ./jinc-cms
      dockerfile: Dockerfile
    container_name: jinc_cms
    restart: unless-stopped
    env_file: ./jinc-cms/.env
    environment:
      # Forçamos development para liberar o Content-Type Builder
      NODE_ENV: development
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: /opt/app/.tmp/data.db
      PORT: 1337
      STRAPI_TELEMETRY_DISABLED: "true"
    ports:
      - "1337:1337"
      - "5173:5173"
    volumes:
      # BIND MOUNT: Sincroniza o código (src, api, etc) com seu VS Code no Windows
      - ./jinc-cms:/opt/app
      # ANONYMOUS VOLUME: Protege os pacotes do Linux para não misturar com o Windows
      - /opt/app/node_modules
      # PERSISTÊNCIA: Mantém suas imagens e banco de dados salvos
      - strapi_uploads:/opt/app/public/uploads
      - strapi_data:/opt/app/.tmp
    networks:
      - jinc_network
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:1337/_health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 15 # Aumentado para dar tempo de compilar no Windows/WSL2
      start_period: 60s

  frontend:
    build:
      context: ./jinc-frontend
      dockerfile: Dockerfile
      target: builder # Builder contém o código fonte e as dependências completas
    container_name: jinc_frontend
    restart: unless-stopped
    env_file: ./jinc-frontend/.env.local
    environment:
      # O Frontend agora roda em modo dev para habilitar HMR (Vibe-Coding)
      NODE_ENV: development
      INTERNAL_STRAPI_URL: http://cms:1337
      NEXT_PUBLIC_STRAPI_API_URL: http://localhost:1337
      WATCHPACK_POLLING: "true" # Melhora detecção de arquivos no Windows/WSL2
    ports:
      - "3000:3000"
    command: sh -c "npm install && npx next dev"
    volumes:
      - ./jinc-frontend:/app
      - /app/node_modules # Protege node_modules interno do Linux
    depends_on:
      cms:
        condition: service_healthy # Espera o check de saúde do CMS
    networks:
      - jinc_network

volumes:
  strapi_uploads:
  strapi_data:


networks:
  jinc_network:
    driver: bridge
